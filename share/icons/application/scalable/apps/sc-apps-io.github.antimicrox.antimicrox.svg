<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">

  <!-- Fundo preto -->
  <rect width="800" height="800" fill="#000"/>

  <!-- Controle -->
  <path d="M170 430
           C130 300 230 220 330 250
           L470 250
           C570 220 670 300 630 430
           C610 500 560 540 510 490
           L470 440
           H330
           L290 490
           C240 540 190 500 170 430Z"
        fill="#222"
