  <!-- D-Pad -->
  <rect x="260" y="330" width="35" height="110" rx="8" fill="#00eaff"/>
  <rect x="222" y="368" width="110" height="35" rx="8" fill="#00eaff"/>

  <!-- Botões -->
  <circle cx="520" cy="350" r="25" fill="#ff0055"/>
  <circle cx="580" cy="400" r="25" fill="#00ff88"/>
  <circle cx="520" cy="450" r="25" fill="#ffaa00"/>
  <circle cx="460" cy="400" r="25" fill="#8a2be2"/>

  <!-- Analógicos -->
  <circle cx="350" cy="400" r="35" fill="#111" stroke="#00eaff" stroke-width="8"/>
  <circle cx="450" cy="400" r="35" fill="#111" stroke="#00eaff" stroke-width="8"/>

  <!-- Texto -->
  <text x="400" y="650"
        text-anchor="middle"
        font-family="Arial Black, sans-serif"
        font-size="90"
